<div th:fragment="content">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Ajouter Employe</h2>

            <form th:action="@{/employee/add}" th:object="${employee}" method="post">
                <div>
                    <label for="name">Nom (clé interne) :</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>

                <div>
                    <label for="first_name">Prénom :</label>
                    <input type="text" id="first_name" th:field="*{first_name}" required>
                </div>

                <div>
                    <label for="middle_name">Deuxième prénom :</label>
                    <input type="text" id="middle_name" th:field="*{middle_name}">
                </div>

                <div>
                    <label for="last_name">Nom de famille :</label>
                    <input type="text" id="last_name" th:field="*{last_name}" required>
                </div>

                <div>
                    <label for="date_of_birth">Date de naissance :</label>
                    <input type="date" id="date_of_birth" th:field="*{date_of_birth}" required>
                </div>

                <div>
                    <label for="date_of_joining">Date d'embauche :</label>
                    <input type="date" id="date_of_joining" th:field="*{date_of_joining}" required>
                </div>

                <div>
                    <label for="gender">Genre :</label>
                    <select id="gender" th:field="*{gender}" required>
                        <option value="">-- Sélectionnez --</option>
                        <option value="Male">Homme</option>
                        <option value="Female">Femme</option>
                        <option value="Other">Autre</option>
                    </select>
                </div>

                <div>
                    <label for="company">Entreprise :</label>
                    <input type="text" id="company" th:field="*{company}" required>
                </div>

                <div>
                    <button type="submit">Enregistrer</button>
                </div>
            </form>

            <div th:if="${message}" style="color:green;">[[${message}]]</div>
            <div th:if="${error}" style="color:red;">[[${error}]]</div>
        </div>
    </div>
</div>
