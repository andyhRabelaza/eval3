<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/image/erp.png">
    <title>ErpNext</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <link rel="stylesheet" th:href="@{/css/accueil.css}">
    <link rel="stylesheet" th:href="@{/css/pagination.css}">
    <link rel="stylesheet" th:href="@{/css/tableau.css}">
    <link rel="stylesheet" th:href="@{/css/bouton.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center">
                <a class="navbar-brand me-4" href="/index">ErpNext</a>

                <div class="d-flex align-items-center user-info">
                    <img th:src="@{/image/logo.png}" alt="Utilisateur" class="user-avatar">
                    <span class="username-text" th:text="${username}">Nom Utilisateur</span>
                </div>
            </div>

            <form th:action="@{/logout}" method="post" class="m-0 p-0 logout-form">
                <button type="submit" class="btn btn-link text-light p-0 logout-btn">
                    <i class="bi bi-box-arrow-right logout-icon" style="font-size: 1rem;"> Déconnexion</i>
                </button>
            </form>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/index}">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/import}">Import</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees}">Liste employe</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/salary}">Salaire employe</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/salary-employe}">Filtrage employe</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/salary-features}">Statistique</a>
                </li>
            </ul>
        </div>

        <main>
            <div th:replace="${page} :: content"></div>
        </main>
    </div>

    <script th:src="@{/JS/salary_name.js}"></script>
    <script th:src="@{/JS/salary-details.js}"></script>


</body>

</html>
