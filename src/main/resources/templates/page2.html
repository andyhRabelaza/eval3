<!-- templates/page2.html -->
<div th:fragment="content">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Page 2</h2>

            <ul>
                <li th:each="element : ${elements}" th:text="${element}"></li>
            </ul>

            <!-- Pagination -->
            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/page2(page=${currentPage - 1})}">Précédent</a>
                    </li>

                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/page2(page=${i})}" th:text="${i}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/page2(page=${currentPage + 1})}">Suivant</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>
