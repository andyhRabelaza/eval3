<!-- templates/page3.html -->
<div th:fragment="content">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Liste des utilisateurs</h2>

            <!-- Formulaire de recherche -->
            <form method="get" action="/page3" class="mb-3">
                <input type="text" name="search" th:value="${search}" placeholder="Rechercher..." />
                <button type="submit">Rechercher</button>
            </form>

            <!-- Tableau -->
            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Rôle</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${utilisateurs}">
                        <td th:text="${user[0]}"></td>
                        <td th:text="${user[1]}"></td>
                        <td th:text="${user[2]}"></td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/page3(page=${currentPage - 1})}">Précédent</a>
                    </li>

                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/page3(page=${i})}" th:text="${i}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/page3(page=${currentPage + 1})}">Suivant</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>
