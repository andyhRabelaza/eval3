<div th:fragment="content">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Filtrage des employe</h2>

            <form th:action="@{/salaremp}" method="get" class="mb-3"
                style="display: flex; gap: 10px; align-items: center;">
                <input type="month" name="monthYear" th:value="${selectedMonth}" class="form-control" style="width: 200px;" />
                <button type="submit" class="btn-search">Filtrer</button>
            </form>



            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Employé</th>
                        <th>Nom</th>
                        <th>Date début</th>
                        <th>Date fin</th>
                        <th>Brut</th>
                        <th>Net</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="slip : ${salarySlips}">
                        <td th:text="${slip.employee}">EMP001</td>
                        <td th:text="${slip.employee_name}">John Doe</td>
                        <td th:text="${slip.start_date}">2025-01-01</td>
                        <td th:text="${slip.end_date}">2025-01-31</td>
                        <td th:text="${slip.gross_pay}">2000.00</td>
                        <td th:text="${slip.net_pay}">1800.00</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th colspan="4">Total</th>
                        <th th:text="${totalGrossPay}">0.00</th>
                        <th th:text="${totalNetPay}">0.00</th>
                    </tr>
                </tfoot>
            </table>


        </div>
    </div>
</div>
